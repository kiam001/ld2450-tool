<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LD2450 Architect v22.0 (ESPHome 2026 Edition)</title>
    <style>
        :root { --primary: #007bff; --bg: #f4f4f9; --panel: #ffffff; --border: #ccc; --success: #28a745; --danger: #dc3545; }
        body { font-family: -apple-system, system-ui, sans-serif; display: flex; height: 100vh; margin: 0; background: var(--bg); color: #333; overflow: hidden; }
        .sidebar { width: 380px; flex-shrink: 0; display: flex; flex-direction: column; background: var(--panel); border-right: 1px solid var(--border); box-shadow: 2px 0 10px rgba(0,0,0,0.05); z-index: 10; }
        .output-panel { width: 450px; flex-shrink: 0; display: flex; flex-direction: column; background: var(--panel); border-left: 1px solid var(--border); z-index: 10; }
        .main { flex-grow: 1; display: flex; justify-content: center; align-items: center; overflow: auto; background-image: radial-gradient(#ccc 1px, transparent 1px); background-size: 20px 20px; position: relative; padding: 50px; box-sizing: border-box; }
        .canvas-wrapper { background: white; border: 2px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.15); position: relative; flex-shrink: 0; }
        #canvas { display: block; cursor: crosshair; }
        .header { padding: 15px; background: #fff; border-bottom: 1px solid var(--border); }
        .header h2 { margin: 0; font-size: 1.1rem; color: var(--primary); }
        .section { padding: 15px; border-bottom: 1px solid var(--border); overflow-y: auto; flex-grow: 1;}
        .input-group { margin-bottom: 10px; }
        .input-group label { display: block; font-size: 0.75rem; font-weight: 700; margin-bottom: 4px; color: #555; }
        .input-group input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        .live-box { background: #e8f5e9; border: 1px solid #c8e6c9; border-radius: 4px; padding: 10px; margin-bottom: 10px; }
        .status-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: #999; margin-right: 5px; vertical-align: middle;}
        .status-dot.active { background: #28a745; box-shadow: 0 0 5px #28a745; }
        .zone-list { min-height: 100px; padding: 10px; background: #fafafa; border: 1px solid #eee; margin-bottom: 10px;}
        .zone-item { background: #fff; border: 1px solid #ddd; padding: 8px; margin-bottom: 5px; border-radius: 4px; cursor: pointer; display: flex; align-items: center; gap: 8px;}
        .zone-item.active { background: #e3f2fd; border-color: var(--primary); }
        .zone-color { width: 12px; height: 12px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.1); }
        .zone-name { flex-grow: 1; border: none; background: transparent; font-size: 0.9rem;}
        .actions { padding: 10px; border-top: 1px solid var(--border); display: grid; grid-template-columns: 1fr 1fr; gap: 8px; background: #fff;}
        button { padding: 8px; border: none; border-radius: 4px; font-weight: 600; cursor: pointer; font-size: 0.85rem; background: #e9ecef;}
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-warning { background: #ffc107; color: #333; }
        .overlay-info { position: absolute; top: 10px; left: 10px; background: rgba(255,255,255,0.9); padding: 5px; border-radius: 4px; font-size: 0.75rem; border: 1px solid #ddd; pointer-events: none;}
        .output-section { flex: 1; display: flex; flex-direction: column; padding: 15px; border-bottom: 1px solid #eee; overflow: hidden;}
        .output-section h3 { margin: 0 0 10px 0; font-size: 0.9rem; display: flex; justify-content: space-between; }
        textarea { flex-grow: 1; font-family: monospace; font-size: 11px; padding: 8px; border: 1px solid #ccc; background: #f8f8f8; resize: none; white-space: pre; overflow: auto; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100; justify-content: center; align-items: center; }
        .modal { background: white; width: 600px; padding: 20px; border-radius: 8px; display: flex; flex-direction: column; gap: 10px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="header">
            <h2>LD2450 Architect v22.0</h2>
            <div style="font-size: 0.75rem; color: #666;">Optimiert für ESPHome 2026</div>
        </div>

        <div class="section">
            <div class="live-box">
                <div class="input-group">
                    <label>Home Assistant URL</label>
                    <input type="text" id="haUrl" placeholder="http://192.168.x.x:8123">
                </div>
                <div class="input-group">
                    <label>Langzeit-Zugangstoken</label>
                    <input type="password" id="haToken">
                </div>
                <button class="btn-success" style="width:100%" onclick="startLive()">
                    <span class="status-dot" id="statusDot"></span> Live Verbinden
                </button>
                <div id="debugMsg" style="font-size: 0.7rem; color: #666; margin-top:5px;"></div>
            </div>

            <div class="input-group">
                <label>ESPHome Gerätename (ID)</label>
                <input type="text" id="devName" value="ld2450-flur" oninput="updateAll()">
            </div>
            <div class="input-group">
                <label>Friendly Name</label>
                <input type="text" id="friendlyName" value="LD2450 flur" oninput="updateAll()">
            </div>

            <div class="zone-list" id="zoneList"></div>
        </div>

        <div class="actions">
            <button class="btn-primary" onclick="addZone()">+ Neue Zone</button>
            <button onclick="clearActiveZone()">Leeren</button>
            <button class="btn-warning" onclick="openYamlModal()">📝 Import</button>
            <button onclick="exportConfig()">💾 Speichern</button>
            <button onclick="document.getElementById('fileInput').click()">📂 Laden</button>
        </div>
        <input type="file" id="fileInput" style="display: none" accept=".json" onchange="importConfig(this)">
    </div>

    <div class="main">
        <div class="canvas-wrapper">
            <canvas id="canvas" width="600" height="600"></canvas>
            <div class="overlay-info">
                <b>Punkt:</b> Drag & Drop | <b>Rechtsklick:</b> Löschen<br>
                <span style="color:blue">● T1</span> <span style="color:red">● T2</span> <span style="color:green">● T3</span>
            </div>
        </div>
    </div>

    <div class="output-panel">
        <div class="output-section">
            <h3>1. Firmware (ESPHome 2026) <button onclick="copyToClip('outFirmware')">Kopieren</button></h3>
            <textarea id="outFirmware" readonly></textarea>
        </div>
        <div class="output-section">
            <h3>2. Plotly Karte (HA) <button onclick="copyToClip('outCard')">Kopieren</button></h3>
            <textarea id="outCard" readonly></textarea>
        </div>
    </div>

    <div class="modal-overlay" id="yamlModal">
        <div class="modal">
            <h3>YAML Zonen Import</h3>
            <textarea id="yamlInput" style="height:300px;" placeholder="zones: ..."></textarea>
            <div style="display:flex; justify-content: flex-end; gap: 10px;">
                <button onclick="closeYamlModal()">Abbrechen</button>
                <button class="btn-success" onclick="processYaml()">Importieren</button>
            </div>
        </div>
    </div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const W = 600, H = 600, SENSOR_X = 300, SENSOR_Y = 600, METER_TO_PX = 100, SNAP_DIST = 15;

    let config = { name: "ld2450-flur", friendly: "LD2450 flur", zones: [ { id: 1, name: "Flur", color: "#007bff", points: [] } ] };
    let activeZoneIdx = 0;
    let dragInfo = { active: false, pointIdx: -1 };
    let liveTargets = { t1: {x:0,y:0,a:false}, t2: {x:0,y:0,a:false}, t3: {x:0,y:0,a:false} };
    let liveInterval = null;

    function init() {
        if(localStorage.getItem('ha_token')) document.getElementById('haToken').value = localStorage.getItem('ha_token');
        if(localStorage.getItem('ha_url')) document.getElementById('haUrl').value = localStorage.getItem('ha_url');
        renderUI(); draw(); updateAll();
        canvas.addEventListener('mousedown', handleMouseDown);
        canvas.addEventListener('mousemove', handleMouseMove);
        canvas.addEventListener('mouseup', handleMouseUp);
        canvas.addEventListener('contextmenu', e => e.preventDefault());
    }

    function draw() {
        ctx.clearRect(0, 0, W, H);
        drawGrid(); drawCoverage();
        config.zones.forEach((zone, idx) => drawPoly(zone, idx === activeZoneIdx));
        drawLiveTargets();
    }

    function drawGrid() {
        ctx.strokeStyle = '#f0f0f0'; ctx.lineWidth = 1;
        for(let x=0; x<=W; x+=50) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
        for(let y=0; y<=H; y+=50) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
        ctx.strokeStyle = '#ddd'; ctx.beginPath(); ctx.moveTo(SENSOR_X, 0); ctx.lineTo(SENSOR_X, H); ctx.stroke();
        ctx.fillStyle = '#333'; ctx.beginPath(); ctx.arc(SENSOR_X, SENSOR_Y, 6, 0, Math.PI*2); ctx.fill();
    }

    function drawCoverage() {
        const covX = [0, 520, 450, 400, 300, 200, 100, 0, -100, -200, -300, -400, -450, -520, 0];
        const covY = [0, 300, 396, 447, 519, 565, 591, 600, 591, 565, 519, 447, 396, 300, 0];
        ctx.beginPath(); for(let i=0; i<covX.length; i++) { let px = covX[i] + SENSOR_X; let py = SENSOR_Y - covY[i]; i===0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py); }
        ctx.fillStyle = "rgba(0, 123, 255, 0.05)"; ctx.fill();
    }

    function drawPoly(zone, isActive) {
        if(zone.points.length === 0) return;
        ctx.beginPath(); ctx.moveTo(zone.points[0].x, zone.points[0].y);
        for(let i=1; i<zone.points.length; i++) ctx.lineTo(zone.points[i].x, zone.points[i].y);
        ctx.closePath();
        ctx.fillStyle = isActive ? hexToRgba(zone.color, 0.2) : 'rgba(200,200,200,0.1)';
        ctx.strokeStyle = isActive ? zone.color : '#ccc'; ctx.lineWidth = 2; ctx.fill(); ctx.stroke();
        if(isActive) zone.points.forEach(p => { ctx.fillStyle = zone.color; ctx.beginPath(); ctx.arc(p.x, p.y, 5, 0, Math.PI*2); ctx.fill(); });
    }

    function drawLiveTargets() {
        const colors = { t1: 'blue', t2: 'red', t3: 'green' };
        Object.keys(liveTargets).forEach(k => {
            const t = liveTargets[k]; if(!t.a) return;
            let px = (t.x * METER_TO_PX) + SENSOR_X; let py = SENSOR_Y - (t.y * METER_TO_PX);
            ctx.fillStyle = colors[k]; ctx.beginPath(); ctx.arc(px, py, 6, 0, Math.PI*2); ctx.fill();
            ctx.fillText(k.toUpperCase(), px+8, py-8);
        });
    }

    function handleMouseDown(e) {
        const rect = canvas.getBoundingClientRect(); const x = e.clientX - rect.left, y = e.clientY - rect.top;
        const zone = config.zones[activeZoneIdx];
        for(let i = zone.points.length-1; i>=0; i--) {
            if(Math.hypot(zone.points[i].x - x, zone.points[i].y - y) < SNAP_DIST) {
                if(e.button === 2) { zone.points.splice(i, 1); draw(); updateAll(); return; }
                dragInfo = { active: true, pointIdx: i }; return;
            }
        }
        if(e.button === 0) { zone.points.push({x, y}); draw(); updateAll(); }
    }

    function handleMouseMove(e) {
        if(!dragInfo.active) return;
        const rect = canvas.getBoundingClientRect();
        config.zones[activeZoneIdx].points[dragInfo.pointIdx] = { x: e.clientX - rect.left, y: e.clientY - rect.top };
        draw();
    }
    function handleMouseUp() { if(dragInfo.active) { dragInfo.active = false; updateAll(); } }

    async function startLive() {
        const url = document.getElementById('haUrl').value.trim().replace(/\/$/, "");
        const token = document.getElementById('haToken').value.trim();
        const devId = document.getElementById('devName').value.trim().replace(/-/g, '_').toLowerCase();
        if(!token) return alert("Token erforderlich!");
        localStorage.setItem('ha_token', token); localStorage.setItem('ha_url', url);
        if(liveInterval) clearInterval(liveInterval);
        document.getElementById('debugMsg').innerText = "Verbinde...";
        liveInterval = setInterval(async () => {
            try {
                const response = await fetch(`${url}/api/states`, { headers: { 'Authorization': `Bearer ${token}` } });
                const data = await response.json();
                const getTarget = (tid) => {
                    const sx = data.find(e => e.entity_id === `sensor.${devId}_${tid}_x_position`);
                    const sy = data.find(e => e.entity_id === `sensor.${devId}_${tid}_y_position`);
                    if(sx && sy && !isNaN(parseFloat(sx.state))) return { x: parseFloat(sx.state), y: parseFloat(sy.state), a: true };
                    return { x: 0, y: 0, a: false };
                };
                liveTargets.t1 = getTarget('t1'); liveTargets.t2 = getTarget('t2'); liveTargets.t3 = getTarget('t3');
                document.getElementById('statusDot').classList.add('active');
                document.getElementById('debugMsg').innerText = "Live Daten empfangen.";
                draw();
            } catch(e) { document.getElementById('debugMsg').innerText = "Verbindung verloren."; }
        }, 1000);
    }

    function updateAll() {
        config.name = document.getElementById('devName').value;
        config.friendly = document.getElementById('friendlyName').value;
        generateOutputs();
    }

    function generateOutputs() {
        const dev = config.name; const devId = dev.replace(/-/g, '_');
        let yaml = `esphome:\n  name: "${dev}"\n  friendly_name: "${config.friendly}"\n\n# ... Basis-Konfig ...\n\nwifi:\n  min_auth_mode: WPA2\n\nLD2450:\n  uart_id: uart_bus\n  targets:\n`;
        ['t1','t2','t3'].forEach(t => {
            yaml += `    - target:\n        name: "${t.toUpperCase()}"\n        id: ${t}\n        x_position: { name: "x_position" }\n        y_position: { name: "y_position" }\n`;
        });
        yaml += `  zones:\n`;
        config.zones.forEach(z => {
            if(z.points.length < 3) return;
            yaml += `    - zone:\n        name: "${z.name}"\n        polygon:\n`;
            z.points.forEach(p => {
                let mx = ((p.x - SENSOR_X) / METER_TO_PX).toFixed(2);
                let my = ((SENSOR_Y - p.y) / METER_TO_PX).toFixed(2);
                yaml += `          - point: { x: ${mx}m, y: ${my}m }\n`;
            });
            const zid = z.name.toLowerCase().replace(/ /g, '_');
            yaml += `        occupancy: { id: ${zid}_occ, name: "${z.name} Occupancy" }\n`;
        });
        document.getElementById('outFirmware').value = yaml;

        let card = `type: custom:plotly-graph\nentities:\n`;
        const tcolors = {t1: 'blue', t2: 'red', t3: 'green'};
        Object.keys(tcolors).forEach(t => {
            card += `  - entity: sensor.${devId}_${t}_x_position\n    name: ${t.toUpperCase()}\n    mode: markers\n    marker: { color: ${tcolors[t]}, size: 12 }\n    x: [ $ex parseFloat(hass.states['sensor.${devId}_${t}_x_position']?.state || 0) * 100 ]\n    y: [ $ex parseFloat(hass.states['sensor.${devId}_${t}_y_position']?.state || 0) * 100 ]\n`;
        });
        document.getElementById('outCard').value = card;
    }

    // Helper functions
    function hexToRgba(hex, alpha) {
        const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
        return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }
    function renderUI() {
        const container = document.getElementById('zoneList'); container.innerHTML = "";
        config.zones.forEach((z, i) => {
            const div = document.createElement('div'); div.className = `zone-item ${i === activeZoneIdx ? 'active' : ''}`;
            div.innerHTML = `<div class="zone-color" style="background:${z.color}"></div><input class="zone-name" value="${z.name}" onchange="config.zones[${i}].name=this.value; updateAll()">`;
            div.onclick = () => { activeZoneIdx = i; renderUI(); draw(); };
            container.appendChild(div);
        });
    }
    function addZone() { config.zones.push({ id: Date.now(), name: "Neue Zone", color: "#"+Math.floor(Math.random()*16777215).toString(16), points: [] }); renderUI(); }
    function clearActiveZone() { config.zones[activeZoneIdx].points = []; draw(); updateAll(); }
    function openYamlModal() { document.getElementById('yamlModal').style.display = 'flex'; }
    function closeYamlModal() { document.getElementById('yamlModal').style.display = 'none'; }
    function copyToClip(id) { document.getElementById(id).select(); document.execCommand('copy'); }
    function exportConfig() { const blob = new Blob([JSON.stringify(config)], {type: 'application/json'}); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = 'ld2450_config.json'; a.click(); }

    init();
</script>
</body>
</html>
